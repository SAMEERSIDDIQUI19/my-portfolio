<section class="relative bg-slate-950 py-20 px-4 overflow-hidden">
  <div class="absolute inset-0 bg-gradient-to-t from-slate-900/30 to-slate-950 pointer-events-none"></div>

  <div class="relative z-10 max-w-6xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-14">
      <h2 class="text-3xl sm:text-4xl lg:text-5xl font-black text-slate-100 tracking-tight mb-3">
        My <span class="bg-gradient-to-r from-emerald-400 to-blue-500 bg-clip-text text-transparent">Skills</span>
      </h2>
      <p class="text-slate-400 text-base sm:text-lg max-w-xl mx-auto">
        Technologies and tools I work with daily
      </p>
    </div>

    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
      @for (skill of skills; track skill.name) {
        <div class="bg-slate-900/60 backdrop-blur-sm border border-slate-800/80 rounded-2xl p-5
                    hover:border-emerald-500/30 hover:-translate-y-0.5 transition-all duration-300 group">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
              <span class="text-2xl">{{ skill.icon }}</span>
              <h3 class="text-sm font-bold text-slate-100 group-hover:text-emerald-400 transition-colors">{{ skill.name }}</h3>
            </div>
            <span class="text-sm font-black" [style.color]="skill.color">{{ skill.level }}%</span>
          </div>
          <!-- Progress bar -->
          <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full rounded-full transition-all duration-700"
                 [style.width.%]="skill.level"
                 [style.background]="'linear-gradient(90deg, ' + skill.color + ', ' + skill.color + '99)'">
            </div>
          </div>
          <p class="text-xs text-slate-500 mt-2">{{ skill.category }}</p>
        </div>
      }
    </div>
  </div>
</section>
